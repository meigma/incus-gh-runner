github:
  config_url: https://github.com/OWNER/REPOSITORY
  scale_set: incus-linux-x64
  # Required for repository scope; use a private repo unless public-repo threat review is complete.
  runner_group: default
# GitHub credentials are supplied by one systemd credential drop-in.
incus:
  project: github-runners
  image: incus-gh-runner-v0.1.0
  # Apply only the validated restricted runner profile; do not add default.
  profiles: [github-runner]
  owner: incus-gh-runner-production
  bootstrap_timeout: 5m
  # Diagnostics persistence is opt-in; see the operations guide before enabling it.
  diagnostics_dir: ""
capacity:
  min_runners: 1
  max_runners: 4
concurrency:
  incus_operations: 2
reconcile_interval: 1s
timeouts:
  incus_operation: 5m
  shutdown: 30s
retry:
  initial: 1s
  maximum: 30s
# Uncomment with one job-proof credential drop-in after enrolling the host public key.
# job_proof:
#   host_id: builder-host-01
