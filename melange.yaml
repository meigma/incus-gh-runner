# Builds the incus-gh-runner binary into a signed Wolfi apk; apko.yaml assembles it
# into the minimal multi-arch runtime image. version/commit/date are stamped into
# the binary via -ldflags, mirroring GoReleaser.
#
# package.version is bumped by release-please (extra-files in release-please-config.json).
# The build-time version/commit/date are injected via --vars-file (see the release
# workflow and the `image-local` mise task), so no date math runs inside the sandbox.
package:
  name: incus-gh-runner
  version: "1.2.0" # x-release-please-version
  epoch: 0
  description: Incus-backed GitHub Actions runner controller
  copyright:
    - license: Apache-2.0 OR MIT

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - go-1.26
  environment:
    CGO_ENABLED: "0"

# Defaults; overridden at build time via `--vars-file` with the real release values.
vars:
  version: "0.0.0"
  commit: "none"
  date: "unknown"

pipeline:
  # go/build auto-adds -trimpath and installs to /usr/bin/<output>.
  - uses: go/build
    with:
      packages: ./cmd/incus-gh-runner
      output: incus-gh-runner
      go-package: go-1.26
      modroot: .
      strip: "-s -w"
      ldflags: "-buildid= -X main.version=${{vars.version}} -X main.commit=${{vars.commit}} -X main.date=${{vars.date}}"
      extra-args: "-mod=readonly -buildvcs=false"
