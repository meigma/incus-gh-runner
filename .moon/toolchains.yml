# Toolchains for incus-gh-runner.
#
# Tool versions (Go, Python, uv, and the CLIs) are managed by mise (mise.toml +
# mise.lock); moon runs every task against `system` binaries that mise puts on
# PATH, so no language toolchain is declared here.

# JavaScript ecosystems can be added later if the project needs them.
# javascript:
#   packageManager: 'pnpm'
#   inferTasksFromScripts: true
