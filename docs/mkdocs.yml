site_name: incus-gh-runner
site_description: Incus-backed ephemeral GitHub Actions runners
site_url: https://meigma.github.io/incus-gh-runner/
repo_name: meigma/incus-gh-runner
repo_url: https://github.com/meigma/incus-gh-runner
edit_uri: edit/master/docs/docs/
docs_dir: docs
site_dir: build
strict: true

theme:
  name: material
  language: en
  features:
    - content.action.edit
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - How-to guides:
      - Deploy to production: how-to/deploy.md
      - Operate and troubleshoot: how-to/operate.md
      - Runner images: how-to/runner-images.md
  - Reference:
      - Configuration: reference/configuration.md
      - Guest contract: reference/guest-contract.md
  - Explanation:
      - How it works: explanation/how-it-works.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

extra_css:
  - stylesheets/palette.css
