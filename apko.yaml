# Minimal, multi-arch, nonroot runtime image assembled from the locally-built
# incus-gh-runner apk (melange.yaml) plus the Wolfi base packages. Provides
# a distroless-equivalent nonroot posture (uid 65532, ca-certs, tzdata,
# no shell). The Wolfi base intentionally floats to the latest (fresh CA
# bundle/timezones, low CVE surface); the exact resolved versions are recorded in
# the per-build SBOM + provenance attestation rather than pinned in a lockfile.
contents:
  repositories:
    - https://packages.wolfi.dev/os
    - "@local ./packages"
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Per-arch ephemeral melange public keys are appended at build/publish time via
    # --keyring-append (filenames differ per arch; never committed).
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - incus-gh-runner@local

entrypoint:
  command: /usr/bin/incus-gh-runner

# Create the nonroot user/group (uid/gid 65532) and run as it — Wolfi has no
# `nonroot` package; the user is defined here, mirroring distroless:nonroot.
accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

archs:
  - amd64
  - arm64

annotations:
  org.opencontainers.image.title: incus-gh-runner
  org.opencontainers.image.description: Incus-backed GitHub Actions runner controller
  org.opencontainers.image.source: https://github.com/meigma/incus-gh-runner
  org.opencontainers.image.licenses: Apache-2.0 OR MIT
  org.opencontainers.image.version: "1.0.0" # x-release-please-version
