language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'incus-gh-runner'
  description: 'Incus-backed GitHub Actions runner controller.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

# Every task runs against `system` binaries that mise (mise.toml + mise.lock) puts
# on PATH; moon manages no language toolchain itself.
toolchains:
  default: 'system'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'deploy/incus/*.go'
    - 'deploy/incus/cue/deployment.cue'
    - 'deploy/incus/baseline.example.json'
    - 'go.mod'
    - 'go.sum'
    # Tool/version pins. Under the `system` toolchain moon does not hash the Go
    # binary's version, so the mise pins are inputs here too — bumping Go (or any
    # tool) in mise must invalidate the cacheable build task.
    - 'mise.toml'
    - 'mise.lock'
  lintConfig:
    - '.golangci.yml'
    - 'mise.toml'
    - 'mise.lock'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/scripts/**/*.py'
    - '.github/workflows/**/*.yml'
  imageSources:
    - 'image/**/*'
  systemdSources:
    - 'deploy/systemd/**/*'
  incusIsolationSources:
    - 'deploy/incus/**/*'
    - 'scripts/live/live-incus-hostile-isolation.sh'
    - 'image/tests/live-incus-hostile-isolation-contract-test.sh'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'golangci-lint fmt --config .golangci.yml --diff'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'golangci-lint run --config .golangci.yml ./... --show-stats=false'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/incus-gh-runner ./cmd/incus-gh-runner'
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/incus-gh-runner'

  test:
    command: 'go test ./...'
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:image-contract-test'
      - 'root:incus-isolation-contract-test'
      - 'root:release-config-test'
      - 'root:systemd-unit-test'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
      - '@group(incusIsolationSources)'
    options:
      cache: false
      runInCI: true

  image-contract-test:
    command: 'bash image/tests/guest-entrypoint-test.sh'
    inputs:
      - '@group(imageSources)'
      - 'mise.toml'
      - 'mise.lock'
    options:
      cache: false
      runInCI: true

  incus-isolation-contract-test:
    script: |
      bash deploy/incus/cue/tests/render-test.sh
      bash image/tests/live-incus-hostile-isolation-contract-test.sh
    inputs:
      - '@group(incusIsolationSources)'
      - 'mise.toml'
      - 'mise.lock'
    options:
      cache: false
      runInCI: true

  release-config-test:
    command: "python -m unittest discover -s .github/scripts -p 'test_*.py'"
    inputs:
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true

  systemd-unit-test:
    command: 'bash deploy/systemd/verify.sh'
    inputs:
      - '@group(systemdSources)'
      - 'mise.toml'
      - 'mise.lock'
    options:
      cache: false
      runInCI: true
