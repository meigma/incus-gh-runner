# This workflow rehearses the release paths without uploading GitHub release
# assets or publishing container images. It is intended for release PRs and
# manual checks before changing release automation.
#
# Keep the pull_request trigger broad so required check contexts still report
# on normal PRs. The jobs intentionally skip unless the PR head branch is a
# Release Please branch, which avoids spending runner time on routine changes.

name: Release Dry Run

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions: {}

jobs:
  binary-release-dry-run:
    name: Binary Release Dry Run
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Create synthetic release tag
        env:
          DRY_RUN_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          git tag -f "$DRY_RUN_TAG"

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GORELEASER_CURRENT_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}

      - name: Stage and validate dry-run release assets
        env:
          DRY_RUN_TAG: v0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: python3 .github/scripts/stage_ghd_release_assets.py --tag "$DRY_RUN_TAG"

      - name: Smoke test dry-run binary
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          binary_name="incus-gh-runner"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected="${binary_name}_${version}_${host_os}_${host_arch}"
          bin="$(jq -r --arg name "$expected" '.[] | select(.type == "Binary" and .name == $name) | .path' dist/artifacts.json)"

          if [ -z "$bin" ] || [ "$bin" = "null" ] || [ ! -f "$bin" ]; then
            echo "failed to locate host binary artifact $expected" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi

          output="$("$bin" --version)"
          printf '%s\n' "$output"

          case "$output" in
            "$binary_name "*"$version"*) ;;
            *) echo "unexpected version output: $output" >&2; exit 1 ;;
          esac

          "$bin" validate --help >/dev/null

      - name: Upload packages for native installation tests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-packages
          path: |
            dist/release-assets/*.deb
            dist/release-assets/*.rpm
          if-no-files-found: error
          retention-days: 1

  package-install-dry-run:
    name: Package Install Dry Run (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    needs:
      - binary-release-dry-run
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            deb_pattern: '*_amd64.deb'
            rpm_pattern: '*.x86_64.rpm'
          - arch: arm64
            runner: ubuntu-24.04-arm
            deb_pattern: '*_arm64.deb'
            rpm_pattern: '*.aarch64.rpm'
    steps:
      - name: Download release packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-packages
          path: packages

      - name: Resolve native packages
        id: packages
        env:
          DEB_PATTERN: ${{ matrix.deb_pattern }}
          RPM_PATTERN: ${{ matrix.rpm_pattern }}
        run: |
          set -euo pipefail

          mapfile -t debs < <(find packages -maxdepth 1 -type f -name "$DEB_PATTERN" -print)
          mapfile -t rpms < <(find packages -maxdepth 1 -type f -name "$RPM_PATTERN" -print)
          if [ "${#debs[@]}" -ne 1 ] || [ "${#rpms[@]}" -ne 1 ]; then
            find packages -maxdepth 1 -type f -print | sort >&2
            echo "expected exactly one native DEB and RPM" >&2
            exit 1
          fi

          deb="$(basename "${debs[0]}")"
          rpm="$(basename "${rpms[0]}")"
          echo "deb=$deb" >> "$GITHUB_OUTPUT"
          echo "rpm=$rpm" >> "$GITHUB_OUTPUT"

      - name: Install and smoke test DEB
        env:
          DEBIAN_IMAGE: debian:13-slim@sha256:020c0d20b9880058cbe785a9db107156c3c75c2ac944a6aa7ab59f2add76a7bd
          PACKAGE: ${{ steps.packages.outputs.deb }}
        run: |
          docker run --rm --platform "linux/${{ matrix.arch }}" \
            --volume "$PWD/packages:/packages:ro" \
            "$DEBIAN_IMAGE" sh -ceu '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y --no-install-recommends "/packages/$1" >/dev/null
              dpkg-query --show --showformat="\${Package} \${Version} \${Architecture}\n" incus-gh-runner
              incus-gh-runner --version
              incus-gh-runner validate --help >/dev/null
              test -f /usr/lib/systemd/system/incus-gh-runner.service
              test -f /usr/lib/tmpfiles.d/incus-gh-runner.conf
              test -f /etc/incus-gh-runner/config.yaml
              test ! -e /etc/systemd/system/multi-user.target.wants/incus-gh-runner.service
            ' sh "$PACKAGE"

      - name: Install and smoke test RPM
        env:
          FEDORA_IMAGE: fedora:44@sha256:6c75d5bf57cb0fa5aa4b92c6a83c86c791644496d9ac230de7711f5b8ec3b898
          PACKAGE: ${{ steps.packages.outputs.rpm }}
        run: |
          docker run --rm --platform "linux/${{ matrix.arch }}" \
            --volume "$PWD/packages:/packages:ro" \
            "$FEDORA_IMAGE" sh -ceu '
              dnf -q install -y "/packages/$1"
              rpm -q --qf "%{NAME} %{VERSION}-%{RELEASE} %{ARCH}\n" incus-gh-runner
              incus-gh-runner --version
              incus-gh-runner validate --help >/dev/null
              test -f /usr/lib/systemd/system/incus-gh-runner.service
              test -f /usr/lib/tmpfiles.d/incus-gh-runner.conf
              test -f /etc/incus-gh-runner/config.yaml
              test ! -e /etc/systemd/system/multi-user.target.wants/incus-gh-runner.service
            ' sh "$PACKAGE"

  # Rehearse the container build: build per-arch signed apks on native runners and
  # assemble the image with apko, WITHOUT pushing, signing, or attesting.
  melange-build-dry-run:
    name: Melange Build Dry Run (${{ matrix.arch }})
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--') }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            apkdir: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            apkdir: aarch64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Resolve dry-run metadata
        id: dry-run
        env:
          DRY_RUN_VERSION: 0.0.0-dryrun.${{ github.run_id }}.${{ github.run_attempt }}
        run: |
          set -euo pipefail
          echo "version=${DRY_RUN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write melange vars file
        env:
          VERSION: ${{ steps.dry-run.outputs.version }}
          COMMIT: ${{ steps.dry-run.outputs.commit }}
          DATE: ${{ steps.dry-run.outputs.date }}
        run: |
          printf 'version: "%s"\ncommit: "%s"\ndate: "%s"\n' "$VERSION" "$COMMIT" "$DATE" > melange-vars.yaml

      - name: Generate ephemeral signing key
        run: melange keygen "melange-${{ matrix.arch }}.rsa"

      - name: Build signed apk
        run: |
          melange build melange.yaml \
            --arch ${{ matrix.arch }} \
            --runner docker \
            --signing-key "melange-${{ matrix.arch }}.rsa" \
            --source-dir . \
            --vars-file melange-vars.yaml

      - name: Upload apk and public key
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-${{ matrix.arch }}
          path: |
            packages/${{ matrix.apkdir }}/**
            melange-${{ matrix.arch }}.rsa.pub
          if-no-files-found: error
          retention-days: 1

  container-image-dry-run:
    name: Container Image Dry Run
    needs:
      - melange-build-dry-run
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release-please--')) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check melange dry-run result
        env:
          MELANGE_RESULT: ${{ needs.melange-build-dry-run.result }}
        run: |
          set -euo pipefail

          if [ "$MELANGE_RESULT" != "success" ]; then
            echo "melange dry-run result was $MELANGE_RESULT" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Download per-arch apks and public keys
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: apk-*
          path: .
          merge-multiple: true

      - name: Assemble image and smoke test (no push)
        run: |
          set -euo pipefail

          apko build apko.yaml incus-gh-runner:dry-run image.tar \
            --arch amd64 \
            --keyring-append ./melange-amd64.rsa.pub \
            --keyring-append ./melange-arm64.rsa.pub

          docker load < image.tar
          docker tag incus-gh-runner:dry-run-amd64 incus-gh-runner:dry-run

          docker run --rm incus-gh-runner:dry-run --version
          docker run --rm incus-gh-runner:dry-run --help >/dev/null
          docker run --rm incus-gh-runner:dry-run validate --help >/dev/null
