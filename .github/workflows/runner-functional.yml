name: Runner Functional Proof
run-name: Phase 5 runner proof (${{ inputs.proof_id }})

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Exact label of the disposable runner scale set
        required: true
        type: string
      proof_id:
        description: Correlation ID for the live proof
        required: false
        default: manual
        type: string
      hold_seconds:
        description: Seconds to keep the runner busy for lifecycle observation
        required: false
        default: 0
        type: number

permissions: {}

concurrency:
  group: runner-functional-${{ inputs.runner_label }}-${{ inputs.proof_id }}
  cancel-in-progress: false

jobs:
  one-shot-runner:
    name: One-shot runner lifecycle
    runs-on: "${{ inputs.runner_label }}"
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Prove the disposable Linux runner
        shell: bash
        env:
          HOLD_SECONDS: ${{ inputs.hold_seconds }}
          PROOF_ID: ${{ inputs.proof_id }}
        run: |
          set -euo pipefail

          test "$(uname -s)" = Linux
          test "$(id -u)" -ne 0

          proof_dir="$(mktemp -d)"
          trap 'rm -rf -- "$proof_dir"' EXIT
          printf 'run_id=%s\nrun_attempt=%s\nrunner_name=%s\n' \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT" \
            "$RUNNER_NAME" \
            >"$proof_dir/evidence.txt"
          printf 'proof_id=%s\n' "$PROOF_ID" >>"$proof_dir/evidence.txt"
          [[ "$HOLD_SECONDS" =~ ^[0-9]+$ ]]
          if (( HOLD_SECONDS > 0 )); then
            sleep "$HOLD_SECONDS"
          fi
          sha256sum "$proof_dir/evidence.txt"
