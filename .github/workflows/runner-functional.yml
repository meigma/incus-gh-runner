name: Runner Functional Check
run-name: Runner functional check (${{ inputs.correlation_id }})

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Exact label of the disposable runner scale set
        required: true
        type: string
      correlation_id:
        description: Correlation ID for this run
        required: false
        default: manual
        type: string
      hold_seconds:
        description: Seconds to keep the runner busy for lifecycle observation
        required: false
        default: 0
        type: number

permissions: {}

concurrency:
  group: runner-functional-${{ inputs.runner_label }}-${{ inputs.correlation_id }}
  cancel-in-progress: false

jobs:
  one-shot-runner:
    name: One-shot runner lifecycle
    runs-on: "${{ inputs.runner_label }}"
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Verify the disposable Linux runner
        shell: bash
        env:
          HOLD_SECONDS: ${{ inputs.hold_seconds }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail

          test "$(uname -s)" = Linux
          test "$(id -u)" -ne 0

          evidence_dir="$(mktemp -d)"
          trap 'rm -rf -- "$evidence_dir"' EXIT
          printf 'run_id=%s\nrun_attempt=%s\nrunner_name=%s\n' \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT" \
            "$RUNNER_NAME" \
            >"$evidence_dir/evidence.txt"
          printf 'correlation_id=%s\n' "$CORRELATION_ID" >>"$evidence_dir/evidence.txt"
          [[ "$HOLD_SECONDS" =~ ^[0-9]+$ ]]
          if (( HOLD_SECONDS > 0 )); then
            sleep "$HOLD_SECONDS"
          fi
          sha256sum "$evidence_dir/evidence.txt"

      - name: Probe the stock runner JIT boundary
        shell: bash
        run: |
          set -euo pipefail

          probe_root=/tmp/incus-gh-runner-jit-boundary
          runner_root=/opt/actions-runner
          install -d -m 0700 "$probe_root"

          listener_pid="$(pgrep -u "$(id -u)" -f '/bin/Runner.Listener run --jitconfig ' | head -n 1)"
          test -n "$listener_pid"

          mapfile -d '' listener_argv <"/proc/${listener_pid}/cmdline"
          jit_config=''
          for ((index = 0; index < ${#listener_argv[@]}; index++)); do
            if [[ "${listener_argv[$index]}" == --jitconfig ]]; then
              jit_config="${listener_argv[$((index + 1))]}"
              break
            fi
          done
          test -n "$jit_config"

          printf '%s' "$jit_config" | base64 --decode >"${probe_root}/jit-config.json"
          chmod 0600 "${probe_root}/jit-config.json"
          jq --exit-status 'type == "object" and length > 0' "${probe_root}/jit-config.json" >/dev/null

          while IFS= read -r config_name; do
            [[ "$config_name" == .* ]]
            test -r "${runner_root}/${config_name}"
            test "$(stat --format=%U "${runner_root}/${config_name}")" = "$(id -un)"
          done < <(jq --raw-output 'keys[]' "${probe_root}/jit-config.json")

          if tr '\0' '\n' <"/proc/${listener_pid}/environ" \
            | grep -Eq '^INCUS_GH_RUNNER_GITHUB_(TOKEN|APP_PRIVATE_KEY)='; then
            printf 'renewable controller credential reached the runner listener\n' >&2
            exit 1
          fi

          printf '%s' "$jit_config" >"${probe_root}/encoded-jit-config"
          chmod 0600 "${probe_root}/encoded-jit-config"
          unset jit_config

          printf '%s\n' \
            'listener_worker_same_uid=true' \
            'jit_command_line_readable=true' \
            'jit_files_readable=true' \
            'renewable_controller_credential_absent=true' \
            >"${probe_root}/during-job.result"

          cat >"${probe_root}/attempt-reuse" <<'REUSE'
          #!/usr/bin/env bash
          set -u

          probe_root=/tmp/incus-gh-runner-jit-boundary
          sleep 8
          timeout 15 /opt/actions-runner/run.sh \
            --jitconfig "$(<"${probe_root}/encoded-jit-config")" \
            >"${probe_root}/reuse.log" 2>&1
          reuse_exit="$?"

          if [[ "$reuse_exit" -eq 0 ]]; then
            reuse_result=accepted
          elif grep -Eqi 'session conflict|runner registration has been deleted|not configured|credentials' \
            "${probe_root}/reuse.log"; then
            reuse_result=rejected
          else
            reuse_result=indeterminate
          fi
          printf 'reuse_result=%s\nreuse_exit=%s\n' "$reuse_result" "$reuse_exit" \
            >"${probe_root}/after-job.result"
          REUSE
          chmod 0700 "${probe_root}/attempt-reuse"

          env -u RUNNER_TRACKING_ID setsid "${probe_root}/attempt-reuse" \
            </dev/null >"${probe_root}/launcher.log" 2>&1 &

          cat "${probe_root}/during-job.result"
