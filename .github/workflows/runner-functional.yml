name: Runner Functional Check
run-name: Runner functional check (${{ inputs.correlation_id }})

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Exact label of the disposable runner scale set
        required: true
        type: string
      correlation_id:
        description: Correlation ID for this run
        required: false
        default: manual
        type: string
      hold_seconds:
        description: Seconds to keep the runner busy for lifecycle observation
        required: false
        default: 0
        type: number
      require_job_proof:
        description: Retrieve and preserve the signed job machine proof before other work
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: runner-functional-${{ inputs.runner_label }}-${{ inputs.correlation_id }}
  cancel-in-progress: false

jobs:
  one-shot-runner:
    name: One-shot runner lifecycle
    runs-on: "${{ inputs.runner_label }}"
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Retrieve the required job machine proof
        if: ${{ inputs.require_job_proof }}
        shell: bash
        run: |
          set -euo pipefail

          proof_path="${RUNNER_TEMP}/job-proof.dsse.json"
          incus-gh-runner-proof --output "$proof_path"
          test "$(stat -c '%a' "$proof_path")" = 600

      - name: Preserve the job machine proof
        if: ${{ inputs.require_job_proof }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: job-machine-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/job-proof.dsse.json
          if-no-files-found: error
          retention-days: 1

      - name: Verify the disposable Linux runner
        shell: bash
        env:
          HOLD_SECONDS: ${{ inputs.hold_seconds }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
        run: |
          set -euo pipefail

          test "$(uname -s)" = Linux
          test "$(id -u)" -ne 0

          evidence_dir="$(mktemp -d)"
          trap 'rm -rf -- "$evidence_dir"' EXIT
          printf 'run_id=%s\nrun_attempt=%s\nrunner_name=%s\n' \
            "$GITHUB_RUN_ID" \
            "$GITHUB_RUN_ATTEMPT" \
            "$RUNNER_NAME" \
            >"$evidence_dir/evidence.txt"
          printf 'correlation_id=%s\n' "$CORRELATION_ID" >>"$evidence_dir/evidence.txt"
          [[ "$HOLD_SECONDS" =~ ^[0-9]+$ ]]
          if (( HOLD_SECONDS > 0 )); then
            sleep "$HOLD_SECONDS"
          fi
          sha256sum "$evidence_dir/evidence.txt"
