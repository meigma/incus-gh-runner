name: Reference Image

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/reference-image.yml'
      - 'image/**'
      - 'mise.lock'
      - 'mise.toml'
      - 'moon.yml'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/reference-image.yml'
      - 'image/**'
      - 'mise.lock'
      - 'mise.toml'
      - 'moon.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build offline VM image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install distrobuilder VM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            btrfs-progs \
            build-essential \
            debootstrap \
            dosfstools \
            genisoimage \
            gpg \
            libwin-hivex-perl \
            qemu-kvm \
            rsync \
            squashfs-tools \
            wimtools

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Build unified Incus VM image
        run: mise exec -- image/build.sh build/reference-image

      - name: Inspect image artifact
        run: |
          set -euo pipefail

          archive=build/reference-image/incus-gh-runner-ubuntu-24.04-x86_64.tar.xz
          checksum=${archive}.sha256
          test -s "$archive"
          test -s "$checksum"
          (
            cd "$(dirname "$archive")"
            sha256sum --check "$(basename "$checksum")"
          )

          mkdir -p build/reference-image-inspection
          tar --extract --xz --file "$archive" \
            --directory build/reference-image-inspection \
            metadata.yaml rootfs.img
          qemu-img info --output=json build/reference-image-inspection/rootfs.img >build/reference-image-inspection/qemu-info.json
          jq --exit-status \
            '.format == "qcow2" and .["virtual-size"] == 8589934592' \
            build/reference-image-inspection/qemu-info.json >/dev/null

      - name: Upload reference image proof
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reference-image-${{ github.sha }}
          path: |
            build/reference-image/*.tar.xz
            build/reference-image/*.sha256
            build/reference-image-inspection/metadata.yaml
            build/reference-image-inspection/qemu-info.json
          if-no-files-found: error
          retention-days: 1
